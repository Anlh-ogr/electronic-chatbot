<!-- trang demo embed KiCanvas (tuỳ chọn) -->
<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Kicad CE Circuit View</title>
        <script type="module" src="/static/kicanvas/kicanvas.js"></script>
        <style>
            body {
                margin: 0;
                padding: 20px;
                font-family: Arial, Helvetica, sans-serif;
                background-color: #f5f5f5;
            }
            .viewer-container {
                width: 100%;
                height: 85vh;
                border: 1px solid #ccc;
                border-radius: 10px;
                overflow: hidden;
                background-color: #fff;
            }
            h1 {
                text-align: center;
                color: #333;
            }
        </style>
    </head>
    <body>
        <h1>Mạch Khuếch Đại E Chung (Common Emitter)</h1>
        <div class="viewer-container">
            <kicanvas-embed controls="full">
                <kicanvas-source src="/kicad-projects/amplifiers/01_bjt_topologies/bjt_common_emitter/bjt_common_emitter_CE/bjt_common_emitter_CE.kicad_sch"></kicanvas-source>

                <kicanvas-source src="/kicad-projects/amplifiers/01_bjt_topologies/bjt_common_emitter/bjt_common_emitter_CE/bjt_common_emitter_CE.kicad_pcb"></kicanvas-source>
            </kicanvas-embed>
        </div>

        <p style="text-align: center; margin-top: 10px;">
            Sử dụng chuột trái để xoay (3D), chuột phải để kéo (Pan), và con lăn để phóng to/thu nhỏ.
        </p>
    </body>
</html>
